# Supabase project config. Run `supabase link --project-ref <ref>` once,
# then `supabase db push` to apply migrations.
project_id = "priyasapp"

[api]
enabled = true
port = 54321

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_signup = true
enable_confirmations = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.external.google]
enabled = false   # set to true and provide client_id/secret to enable Google OAuth
client_id = ""
secret = ""

[storage]
enabled = true
file_size_limit = "50MiB"
